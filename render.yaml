services:
  - type: web
    name: subhani-stocks-dashboard
    runtime: python
    region: singapore   # closest to India — NSE unblocked
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run streamlit_app_pro_v2.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true --browser.gatherUsageStats=false
    healthCheckPath: /_stcore/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
